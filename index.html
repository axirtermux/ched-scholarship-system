<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>CHED Scholarship System – ESSU</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body,
        #root {
            height: 100%
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #f0f4f8;
            color: #1a2332
        }

        input,
        select,
        textarea,
        button {
            font-family: inherit
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9
        }

        ::-webkit-scrollbar-thumb {
            background: #c8d4e3;
            border-radius: 99px
        }

        .fade-in {
            animation: fadeIn .3s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .slide-in {
            animation: slideIn .25s ease
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        @media print {
            .no-print {
                display: none !important
            }

            .sidebar {
                display: none !important
            }

            .main-content {
                margin-left: 0 !important
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0 !important;
                padding: 0 !important;
            }

            table {
                font-size: 12px;
            }

            table thead {
                display: none;
            }

            table tbody tr {
                display: block;
                margin-bottom: 10px;
                border: 1px solid #e2e8f0;
                border-radius: 8px;
                padding: 10px;
            }

            table tbody td {
                display: flex;
                justify-content: space-between;
                padding: 5px 0;
                border: none;
            }

            table tbody td::before {
                content: attr(data-label);
                font-weight: 600;
                color: #64748b;
            }
        }

        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }

            input,
            select,
            textarea,
            button {
                font-size: 16px;
                min-height: 44px;
            }

            button {
                padding: 12px 16px;
            }

            .grid-4 {
                grid-template-columns: 1fr !important;
            }

            .grid-2 {
                grid-template-columns: 1fr !important;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .grid-4 {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .grid-2 {
                grid-template-columns: 1fr !important;
            }
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ═══════════════════════════════════════════════════════════════
        // DATA IS NOW FETCHED FROM DATABASE VIA API
        // ═══════════════════════════════════════════════════════════════

        const COURSES = ["BS Education", "BS Nursing", "BS Engineering", "BS IT", "BS Agriculture", "BS Accountancy", "BS Mathematics", "BS Biology", "BS Psychology", "BS Social Work", "BS Criminology", "BS Pharmacy"];
        const SCHOOLS = ["ESSU Borongan -Main", "ESSU Maydolong", "ESSU Salcedo", "ESSU Guiuan", "ESSU Can - Avid", "ESSU Arteche"];
        const DOC_LIST = ["Birth Certificate (PSA)", "Transcript of Records / Report Card", "CHED Scholarship Form (CS-STS)", "Certificate of Enrollment", "Income Tax Return / DSWD Certificate", "Certificate of Indigency", "Parent/Guardian Valid ID", "Applicant Valid ID / School ID", "Medical Certificate", "Barangay Certificate"];

        // ═══════════════════════════════════════════════════════════════
        // UTILITIES
        // ═══════════════════════════════════════════════════════════════
        const uid = () => Math.random().toString(36).slice(2, 8).toUpperCase();
        const today = () => new Date().toISOString().split("T")[0];
        const fmt = (d) => d ? new Date(d).toLocaleDateString("en-PH", { year: "numeric", month: "short", day: "numeric" }) : "—";
        const fmtDT = (d) => d ? new Date(d).toLocaleString("en-PH", { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }) : "—";
        const sColor = (s) => ({ approved: "#16a34a", pending: "#d97706", rejected: "#dc2626", "under review": "#2563eb", suspended: "#7c3aed" }[s?.toLowerCase()] || "#6b7280");
        const sBg = (s) => ({ approved: "#dcfce7", pending: "#fef3c7", rejected: "#fee2e2", "under review": "#dbeafe", suspended: "#ede9fe" }[s?.toLowerCase()] || "#f3f4f6");
        const gColor = (s) => ({ Active: "#16a34a", "At Risk": "#d97706", Suspended: "#dc2626" }[s] || "#6b7280");
        const gBg = (s) => ({ Active: "#dcfce7", "At Risk": "#fef3c7", Suspended: "#fee2e2" }[s] || "#f3f4f6");

        // ═══════════════════════════════════════════════════════════════
        // ICONS
        // ═══════════════════════════════════════════════════════════════
        const Ic = ({ n, s = 18, c }) => {
            const p = { width: s, height: s, viewBox: "0 0 24 24", fill: "none", stroke: c || "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" };
            const m = {
                dash: <svg {...p}><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /></svg>,
                file: <svg {...p}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" /><polyline points="14,2 14,8 20,8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /></svg>,
                pulse: <svg {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>,
                users: <svg {...p}><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 00-3-3.87" /><path d="M16 3.13a4 4 0 010 7.75" /></svg>,
                bell: <svg {...p}><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 01-3.46 0" /></svg>,
                ok: <svg {...p}><polyline points="20 6 9 17 4 12" /></svg>,
                x: <svg {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
                eye: <svg {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></svg>,
                up: <svg {...p}><polyline points="16 16 12 12 8 16" /><line x1="12" y1="12" x2="12" y2="21" /><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3" /></svg>,
                out: <svg {...p}><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>,
                rep: <svg {...p}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" /><polyline points="14,2 14,8 20,8" /><line x1="8" y1="13" x2="16" y2="13" /><line x1="8" y1="17" x2="12" y2="17" /></svg>,
                warn: <svg {...p}><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></svg>,
                search: <svg {...p}><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>,
                plus: <svg {...p}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>,
                edit: <svg {...p}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>,
                trash: <svg {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" /><path d="M10 11v6" /><path d="M14 11v6" /><path d="M9 6V4h6v2" /></svg>,
                print: <svg {...p}><polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2" /><rect x="6" y="14" width="12" height="8" /></svg>,
                dl: <svg {...p}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>,
                shield: <svg {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>,
                chart: <svg {...p}><line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" /></svg>,
                cal: <svg {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>,
                mail: <svg {...p}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" /></svg>,
                key: <svg {...p}><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" /></svg>,
                lock: <svg {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0110 0v4" /></svg>,
                info: <svg {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></svg>,
                home: <svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,
                star: <svg {...p} fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg>,
                settings: <svg {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" /></svg>,
                refresh: <svg {...p}><polyline points="23 4 23 10 17 10" /><polyline points="1 20 1 14 7 14" /><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" /></svg>,
                trend_up: <svg {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><polyline points="17 6 23 6 23 12" /></svg>,
                trend_dn: <svg {...p}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6" /><polyline points="17 18 23 18 23 12" /></svg>,
            };
            return m[n] || null;
        };

        // ═══════════════════════════════════════════════════════════════
        // SHARED COMPONENTS
        // ═══════════════════════════════════════════════════════════════
        const Bar = ({ v, max = 100, color = "#2563eb", h = 8 }) => (
            <div style={{ background: "#e2eaf5", borderRadius: 99, height: h, overflow: "hidden", width: "100%" }}>
                <div style={{ width: `${Math.min(100, (v / max) * 100)}%`, background: color, height: "100%", borderRadius: 99, transition: "width .8s cubic-bezier(.4,0,.2,1)" }} />
            </div>
        );

        const Badge = ({ s, text }) => (
            <span style={{ background: sBg(s || text), color: sColor(s || text), borderRadius: 99, padding: "3px 10px", fontSize: 11, fontWeight: 700, textTransform: "capitalize", whiteSpace: "nowrap", display: "inline-block" }}>{text || s}</span>
        );

        const GBadge = ({ s }) => (
            <span style={{ background: gBg(s), color: gColor(s), borderRadius: 99, padding: "3px 10px", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap", display: "inline-block" }}>{s}</span>
        );

        const Avatar = ({ t, size = 36, bg = "#2563eb" }) => (
            <div style={{ width: size, height: size, borderRadius: "50%", background: bg, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: size * 0.35, flexShrink: 0, letterSpacing: 0 }}>{t}</div>
        );

        const StatCard = ({ label, value, sub, color, icon, trend }) => (
            <div className="fade-in" style={{ background: "#fff", borderRadius: 16, padding: "20px 22px", boxShadow: "0 1px 12px rgba(15,40,80,0.07)", display: "flex", alignItems: "center", gap: 16, borderLeft: `4px solid ${color}`, position: "relative", overflow: "hidden" }}>
                <div style={{ position: "absolute", right: -10, top: -10, width: 80, height: 80, background: color + "10", borderRadius: "50%" }} />
                <div style={{ background: color + "15", borderRadius: 12, padding: 11, color, flexShrink: 0 }}><Ic n={icon} s={22} /></div>
                <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 28, fontWeight: 800, color: "#0f1f3d", fontFamily: "'Playfair Display',serif", lineHeight: 1 }}>{value}</div>
                    <div style={{ fontSize: 12, fontWeight: 600, color: "#64748b", marginTop: 3 }}>{label}</div>
                    {sub && <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 1 }}>{sub}</div>}
                </div>
                {trend && <div style={{ fontSize: 11, fontWeight: 700, color: trend > 0 ? "#16a34a" : "#dc2626", display: "flex", alignItems: "center", gap: 3 }}><Ic n={trend > 0 ? "trend_up" : "trend_dn"} s={14} />{Math.abs(trend)}%</div>}
            </div>
        );

        const Modal = ({ open, onClose, title, children, width = 560 }) => {
            if (!open) return null;
            return (
                <div style={{ position: "fixed", inset: 0, background: "rgba(5,15,35,0.55)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }} onClick={onClose}>
                    <div className="fade-in" style={{ background: "#fff", borderRadius: 20, width: "100%", maxWidth: width, maxHeight: "92vh", overflowY: "auto", boxShadow: "0 25px 80px rgba(0,0,0,0.25)" }} onClick={e => e.stopPropagation()}>
                        <div style={{ padding: "22px 28px", borderBottom: "1px solid #f1f5f9", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, background: "#fff", zIndex: 1, borderRadius: "20px 20px 0 0" }}>
                            <div style={{ fontWeight: 800, fontSize: 16, color: "#0f1f3d", fontFamily: "'Playfair Display',serif" }}>{title}</div>
                            <button onClick={onClose} style={{ background: "#f1f5f9", border: "none", borderRadius: 8, padding: 7, cursor: "pointer", color: "#64748b", display: "flex" }}><Ic n="x" s={16} /></button>
                        </div>
                        <div style={{ padding: "24px 28px" }}>{children}</div>
                    </div>
                </div>
            );
        };

        const Field = ({ label, children, required }) => (
            <div style={{ marginBottom: 16 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: "#374151", display: "block", marginBottom: 6 }}>{label}{required && <span style={{ color: "#dc2626", marginLeft: 2 }}>*</span>}</label>
                {children}
            </div>
        );

        const inp = { width: "100%", padding: "10px 13px", borderRadius: 9, border: "1.5px solid #e2e8f0", fontSize: 13, outline: "none", fontFamily: "'DM Sans',sans-serif", transition: "border-color .15s" };
        const sel = { ...inp, background: "#fff" };

        const Confirm = ({ open, msg, onYes, onNo, danger }) => (
            <Modal open={open} onClose={onNo} title="Confirm Action" width={400}>
                <p style={{ fontSize: 14, color: "#374151", marginBottom: 24, lineHeight: 1.6 }}>{msg}</p>
                <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
                    <button onClick={onNo} style={{ padding: "9px 20px", borderRadius: 9, border: "1.5px solid #e2e8f0", background: "#fff", cursor: "pointer", fontWeight: 600, fontSize: 13 }}>Cancel</button>
                    <button onClick={onYes} style={{ padding: "9px 20px", borderRadius: 9, border: "none", background: danger ? "#dc2626" : "#2563eb", color: "#fff", cursor: "pointer", fontWeight: 700, fontSize: 13 }}>{danger ? "Delete" : "Confirm"}</button>
                </div>
            </Modal>
        );

        const Toast = ({ toasts }) => (
            <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 9999, display: "flex", flexDirection: "column", gap: 10 }}>
                {toasts.map((t) => (
                    <div
                        key={t.id}
                        className="fade-in"
                        style={{
                            background:
                                t.type === "error"
                                    ? "#dc2626"
                                    : t.type === "warn"
                                    ? "#d97706"
                                    : "#16a34a",
                            color: "#fff",
                            borderRadius: 12,
                            padding: "12px 18px",
                            fontSize: 13,
                            fontWeight: 600,
                            boxShadow: "0 8px 24px rgba(0,0,0,0.2)",
                            display: "flex",
                            alignItems: "center",
                            gap: 10,
                            maxWidth: 340,
                        }}
                    >
                        <Ic n={t.type === "error" ? "x" : t.type === "warn" ? "warn" : "ok"} s={16} />
                        {t.msg}
                    </div>
                ))}
            </div>
        );

        // ═══════════════════════════════════════════════════════════════
        // MAIN APP STATE HOOK
        // ═══════════════════════════════════════════════════════════════
        function useAppState() {
            const [applicants, setApplicants] = useState([]);
            const [grantees, setGrantees] = useState([]);
            const [notifications, setNotifications] = useState([]);
            const [users, setUsers] = useState([]);
            const [documents, setDocuments] = useState([]);
            const [toasts, setToasts] = useState([]);
            const [loading, setLoading] = useState(true);

            const apiCall = async (endpoint, method = 'GET', data = null) => {
                try {
                    const options = {
                        method,
                        headers: { 
                            'Content-Type': 'application/json',
                            'X-User-Role': localStorage.getItem('ched_role') || ''
                        },
                    };
                    if (data) options.body = JSON.stringify(data);
                    const res = await fetch(`api.php${endpoint}`, options);
                    const result = await res.json();
                    return result;
                } catch (error) {
                    console.error('API Error:', error);
                    return { success: false, message: error.message };
                }
            };

            useEffect(() => {
                const fetchData = async () => {
                    setLoading(true);
                    const [appsRes, granteesRes, notifsRes, usersRes, docsRes] = await Promise.all([
                        apiCall('/applicants'),
                        apiCall('/grantees'),
                        apiCall('/notifications'),
                        apiCall('/users'),
                        apiCall('/documents')
                    ]);
                    if (appsRes.success) setApplicants(appsRes.data || []);
                    if (granteesRes.success) setGrantees(granteesRes.data || []);
                    if (notifsRes.success) setNotifications(notifsRes.data || []);
                    if (usersRes.success) setUsers(usersRes.data || []);
                    if (docsRes.success) setDocuments(docsRes.data || []);
                    setLoading(false);
                };
                fetchData();
            }, []);

            const toast = (msg, type = "success") => {
                const id = Date.now();
                setToasts(p => [...p, { id, msg, type }]);
                setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3200);
            };

            const addNotif = (msg, type, link) => {
                const n = { id: Date.now(), msg, time: new Date().toISOString().slice(0, 16).replace("T", " "), read: false, type, link };
                setNotifications(p => [n, ...p]);
            };

            const updateApplicant = async (id, data) => {
                const result = await apiCall(`/applicants/${id}`, 'PUT', data);
                if (result.success) {
                    setApplicants(p => p.map(a => a.id === id ? { ...a, ...data } : a));
                    toast('Applicant updated successfully');
                } else {
                    toast(result.message || 'Failed to update applicant', 'error');
                }
            };

            const deleteApplicant = async (id) => {
                const result = await apiCall(`/applicants/${id}`, 'DELETE');
                if (result.success) {
                    setApplicants(p => p.filter(a => a.id !== id));
                    toast('Applicant deleted successfully');
                } else {
                    toast(result.message || 'Failed to delete applicant', 'error');
                }
            };

                if (result.success) {
                    setApplicants(p => [...p, result.data]);
                    addNotif(`New scholarship application received from ${data.name} (${data.course} - ${data.school}). Review required.`, "application", "applications");
                    toast('Application submitted successfully');
                    return result.data;
                } else {
                    toast(result.message || 'Failed to submit application', 'error');
                    return null;
                }
            };

            const updateGrantee = async (id, data) => {
                const result = await apiCall(`/grantees/${id}`, 'PUT', data);
                if (result.success) {
                    setGrantees(p => p.map(g => g.id === id ? { ...g, ...data } : g));
                    toast('Grantee updated successfully');
                } else {
                    toast(result.message || 'Failed to update grantee', 'error');
                }
            };

            const deleteGrantee = async (id) => {
                const result = await apiCall(`/grantees/${id}`, 'DELETE');
                if (result.success) {
                    setGrantees(p => p.filter(g => g.id !== id));
                    toast('Grantee deleted successfully');
                } else {
                    toast(result.message || 'Failed to delete grantee', 'error');
                }
            };

            const addGrantee = async (data) => {
                const result = await apiCall('/grantees', 'POST', data);
                if (result.success) {
                    setGrantees(p => [...p, result.data]);
                    toast('Grantee added successfully');
                    return result.data;
                } else {
                    toast(result.message || 'Failed to add grantee', 'error');
                    return null;
                }
            };

            const updateUser = async (id, data) => {
                const result = await apiCall(`/users/${id}`, 'PUT', data);
                if (result.success) {
                    setUsers(p => p.map(u => u.id === id ? { ...u, ...data } : u));
                    toast('User updated successfully');
                } else {
                    toast(result.message || 'Failed to update user', 'error');
                }
            };

            const deleteUser = async (id) => {
                const result = await apiCall(`/users/${id}`, 'DELETE');
                if (result.success) {
                    setUsers(p => p.filter(u => u.id !== id));
                    toast('User deleted successfully');
                } else {
                    toast(result.message || 'Failed to delete user', 'error');
                }
            };

            const addUser = async (data) => {
                const result = await apiCall('/users', 'POST', data);
                if (result.success) {
                    setUsers(p => [...p, result.data]);
                    toast('User added successfully');
                    return result.data;
                } else {
                    toast(result.message || 'Failed to add user', 'error');
                    return null;
                }
            };

            const markAllRead = async () => {
                const result = await apiCall('/notifications/mark-all-read', 'PUT');
                if (result.success) {
                    setNotifications(p => p.map(n => ({ ...n, read: true })));
                }
            };
            const markRead = async (id) => {
                const result = await apiCall(`/notifications/${id}`, 'PUT', { read: true });
                if (result.success) {
                    setNotifications(p => p.map(n => n.id === id ? { ...n, read: true } : n));
                }
            };
            const deleteNotif = async (id) => {
                const result = await apiCall(`/notifications/${id}`, 'DELETE');
                if (result.success) {
                    setNotifications(p => p.filter(n => n.id !== id));
                }
            };

            const fetchDocumentsByApplicant = async (applicantId) => {
                const result = await apiCall(`/documents?applicant_id=${applicantId}`);
                if (result.success) {
                    return result.data || [];
                } else {
                    toast(result.message || 'Failed to fetch documents', 'error');
                    return [];
                }
            };

            const uploadDocument = async (file, applicantId, documentType) => {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('applicant_id', applicantId);
                formData.append('document_type', documentType);

                try {
                    const res = await fetch('upload.php', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await res.json();
                    if (result.success) {
                        toast('Document uploaded successfully');
                        return result;
                    } else {
                        toast(result.error || 'Failed to upload document', 'error');
                        return null;
                    }
                } catch (error) {
                    toast('Upload failed: ' + error.message, 'error');
                    return null;
                }
            };

            const deleteDocument = async (documentId) => {
                const result = await apiCall(`/documents/${documentId}`, 'DELETE');
                if (result.success) {
                    setDocuments(p => p.filter(d => d.id !== documentId));
                    toast('Document deleted successfully');
                } else {
                    toast(result.message || 'Failed to delete document', 'error');
                }
            };

            return { applicants, grantees, notifications, users, documents, toasts, toast, addNotif, updateApplicant, deleteApplicant, addApplicant, updateGrantee, deleteGrantee, addGrantee, updateUser, deleteUser, addUser, markAllRead, markRead, deleteNotif, fetchDocumentsByApplicant, uploadDocument, deleteDocument, loading };
        }

        // LOGIN PAGE

        function LoginPage({ onLogin, users }) {
            const [role, setRole] = useState("admin");
            const [email, setEmail] = useState("");
            const [pass, setPass] = useState("");
            const [err, setErr] = useState("");
            const [loading, setLoading] = useState(false);
            const [isRegister, setIsRegister] = useState(false);
            const [regName, setRegName] = useState("");
            const [regEmail, setRegEmail] = useState("");
            const [regPass, setRegPass] = useState("");
            const [regConfirmPass, setRegConfirmPass] = useState("");
            const [regContact, setRegContact] = useState("");
            const [regCampus, setRegCampus] = useState("ESSU Borongan -Main");
            const [regErr, setRegErr] = useState("");
            const [regLoading, setRegLoading] = useState(false);

            const handle = async () => {
                setErr("");
                if (!email || !pass) {
                    setErr("Email and password are required");
                    return;
                }
                
                setLoading(true);
                try {
                    const res = await fetch('api.php/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: pass })
                    });
                    const result = await res.json();
                    if (result.success) {
                        const userRole = result.user.role.toLowerCase();
                        if (userRole === 'administrator') {
                            onLogin('admin', result.user);
                        } else if (userRole === 'applicant') {
                            onLogin('applicant', result.user);
                        } else if (userRole === 'grantee') {
                            onLogin('grantee', result.user);
                        } else if (userRole === 'reviewer') {
                            onLogin('admin', result.user);
                        } else {
                            setErr("Unknown user role");
                        }
                    } else {
                        setErr(result.message || "Login failed");
                    }
                } catch (error) {
                    setErr("Network error. Please try again.");
                }
                setLoading(false);
            };

            const handleRegister = async () => {
                setRegErr("");
                if (!regName || !regEmail || !regPass || !regContact) {
                    setRegErr("All fields are required");
                    return;
                }
                if (regPass !== regConfirmPass) {
                    setRegErr("Passwords do not match");
                    return;
                }
                if (regPass.length < 6) {
                    setRegErr("Password must be at least 6 characters");
                    return;
                }
                
                setRegLoading(true);
                try {
                    const res = await fetch('api.php/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: regName,
                            email: regEmail,
                            password: regPass,
                            contact: regContact,
                            campus: regCampus
                        })
                    });
                    const result = await res.json();
                    if (result.success) {
                        setRegErr("");
                        setRegName("");
                        setRegEmail("");
                        setRegPass("");
                        setRegConfirmPass("");
                        setRegContact("");
                        setIsRegister(false);
                        alert("Registration successful! You can now log in with your credentials.");
                    } else {
                        setRegErr(result.message || "Registration failed");
                    }
                } catch (error) {
                    setRegErr("Network error. Please try again.");
                }
                setRegLoading(false);
            };

                    ))}

                    <div className="fade-in" style={{ background: "rgba(255,255,255,0.98)", borderRadius: 24, padding: "48px 44px", width: 440, boxShadow: "0 40px 100px rgba(0,0,0,0.4)", position: "relative", zIndex: 1 }}>

                        </div>

                        {!isRegister ? (
                            <>
                                <Field label="Email Address" required>
                                    <input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && handle()} placeholder="admin@ched.edu.ph" style={inp} />
                                </Field>
                                <Field label="Password" required>
                                    <input type="password" value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === "Enter" && handle()} placeholder="••••••••" style={inp} />

                                <Field label="Full Name" required>

                                </Field>
                                <Field label="Email Address" required>
                                    <input type="email" value={regEmail} onChange={e => setRegEmail(e.target.value)} placeholder="juan@essu.edu.ph" style={inp} />
                                </Field>
                                <Field label="Contact Number" required>
                                    <input value={regContact} onChange={e => setRegContact(e.target.value)} placeholder="09123456789" style={inp} />
                                </Field>
                                <Field label="Campus" required>
                                    <select value={regCampus} onChange={e => setRegCampus(e.target.value)} style={sel}>
                                        <option value="ESSU Borongan -Main">ESSU Borongan -Main</option>
                                        <option value="ESSU Maydolong">ESSU Maydolong</option>
                                        <option value="ESSU Salcedo">ESSU Salcedo</option>
                                        <option value="ESSU Guiuan">ESSU Guiuan</option>
                                        <option value="ESSU Can - Avid">ESSU Can - Avid</option>
                                        <option value="ESSU Arteche">ESSU Arteche</option>
                                    </select>
                                </Field>
                                <Field label="Password" required>
                                    <input type="password" value={regPass} onChange={e => setRegPass(e.target.value)} placeholder="••••••••" style={inp} />
                                </Field>
                                <Field label="Confirm Password" required>
                                    <input type="password" value={regConfirmPass} onChange={e => setRegConfirmPass(e.target.value)} placeholder="••••••••" style={inp} />
                                </Field>

                                {regErr && <div style={{ background: "#fee2e2", color: "#b91c1c", borderRadius: 9, padding: "10px 14px", fontSize: 12, marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}><Ic n="warn" s={14} />{regErr}</div>}

                                <button onClick={handleRegister} disabled={regLoading} style={{ width: "100%", padding: 14, borderRadius: 12, border: "none", background: regLoading ? "#94a3b8" : "linear-gradient(135deg,#16a34a,#2563eb)", color: "#fff", fontWeight: 700, fontSize: 15, cursor: regLoading ? "default" : "pointer", marginTop: 4, boxShadow: "0 4px 15px rgba(37,99,235,0.3)", transition: "all .2s" }}>
                                    {regLoading ? "Registering…" : "Register"}
                                </button>

                                <div style={{ marginTop: 20, textAlign: "center" }}>
                                    <span style={{ fontSize: 12, color: "#64748b" }}>Already have an account? </span>
                                    <button onClick={() => setIsRegister(false)} style={{ background: "none", border: "none", color: "#2563eb", fontWeight: 700, fontSize: 12, cursor: "pointer", textDecoration: "underline" }}>Sign In</button>

                                        {notifs.length === 0 && <div style={{ padding: 24, textAlign: "center", color: "#9ca3af", fontSize: 13 }}>No notifications</div>}
                                        {notifs.slice(0, 8).map(n => (
                                            <div key={n.id} onClick={() => { markRead(n.id); setShowNotifs(false); if (n.link) setActive(getLinkForRole(n.link)); }} style={{ padding: "12px 16px", borderBottom: "1px solid #f8fafc", background: n.read ? "#fff" : "#eff6ff", display: "flex", gap: 12, alignItems: "flex-start", cursor: "pointer" }}>
                                                <div style={{ width: 34, height: 34, borderRadius: 9, background: n.type === "alert" ? "#fee2e2" : n.type === "application" ? "#dcfce7" : "#dbeafe", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: n.type === "alert" ? "#ef4444" : n.type === "application" ? "#22c55e" : "#3b82f6" }}>
                                                    <Ic n={n.type === "alert" ? "warn" : n.type === "application" ? "file" : "rep"} s={14} />
                                                </div>
                                                <div style={{ flex: 1 }}>
                                                    <div style={{ fontSize: 12, color: "#374151", fontWeight: n.read ? 400 : 600, lineHeight: 1.4 }}>{n.msg}</div>
                                                    <div style={{ fontSize: 10, color: "#9ca3af", marginTop: 3 }}>{n.time}</div>
                                                </div>
                                                {!n.read && <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#2563eb", flexShrink: 0, marginTop: 4 }} />}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

                        <StatCard label="Active Grantees" value={activeGrants} sub="This semester" color="#16a34a" icon="users" />
                        <StatCard label="Pending Review" value={pending} sub="Needs action" color="#d97706" icon="warn" />

                                        <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 8, height: 8, borderRadius: "50%", background: color, display: "inline-block" }} />{label}</span>
                                        <span style={{ color }}>{val} <span style={{ color: "#9ca3af", fontWeight: 400 }}>({totApps ? Math.round((val / totApps) * 100) : 0}%)</span></span>
                                    </div>
                                    <Bar v={val} max={totApps || 1} color={color} h={7} />

                        {/* Grantee Alerts */}
                        <div style={{ background: "#fff", borderRadius: 16, padding: 22, boxShadow: "0 1px 12px rgba(15,40,80,0.07)" }}>
                            <div style={{ fontWeight: 700, color: "#0f1f3d", marginBottom: 18, fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}><Ic n="warn" s={16} c="#d97706" />Grantee Alerts</div>
                            {alerts.length === 0 && <div style={{ textAlign: "center", color: "#9ca3af", fontSize: 13, padding: "20px 0" }}>All grantees are compliant ✓</div>}
                            {alerts.map(g => (
                                <div key={g.id} onClick={() => setActive("grantees")} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 10, background: "#fef9f0", marginBottom: 8, cursor: "pointer", border: "1px solid #fde68a" }}>
                                    <Avatar t={g.avatar} size={32} bg="#d97706" />
                                    <div style={{ flex: 1 }}>
                                        <div style={{ fontSize: 12, fontWeight: 700, color: "#0f1f3d" }}>{g.name}</div>
                                        <div style={{ fontSize: 10, color: "#d97706" }}>{g.alerts.join(" · ")}</div>

                    {/* Recent Applications */}
                    <div style={{ background: "#fff", borderRadius: 16, padding: 22, boxShadow: "0 1px 12px rgba(15,40,80,0.07)" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                            <div style={{ fontWeight: 700, color: "#0f1f3d", fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}><Ic n="file" s={16} c="#2563eb" />Recent Applications</div>
                            <button onClick={() => setActive("applications")} style={{ fontSize: 12, color: "#2563eb", background: "none", border: "none", cursor: "pointer", fontWeight: 600 }}>View all →</button>

                        <div style={{ overflowX: "auto" }}>
                            <table>

                                            </td>
                                            <td data-label="Course" style={{ padding: "11px 14px", fontSize: 12, color: "#374151" }}>{a.course}</td>
                                            <td data-label="GWA" style={{ padding: "11px 14px", fontSize: 12, fontWeight: 700, color: a.gwa <= 1.75 ? "#16a34a" : a.gwa <= 2.0 ? "#d97706" : "#dc2626" }}>{parseFloat(a.gwa).toFixed(2)}</td>
                                            <td data-label="Income" style={{ padding: "11px 14px", fontSize: 12, color: "#374151" }}>\u20B1{(a.annual_income || 0).toLocaleString()}</td>

                                            <td data-label="Submitted" style={{ padding: "11px 14px", fontSize: 11, color: "#9ca3af" }}>{fmt(a.submitted_date)}</td>
                                        </tr>

                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════
        // APPLICATIONS PAGE (ADMIN)
        // ═══════════════════════════════════════════════════════════════
        function ApplicationsPage({ applicants, updateApplicant, deleteApplicant, addApplicant, addGrantee, grantees, toast, addNotif, user, role }) {
            const [search, setSearch] = useState("");
            const [filter, setFilter] = useState("all");
            const [selected, setSelected] = useState(null);
            const [addModal, setAddModal] = useState(false);
            const [editModal, setEditModal] = useState(null);
            const [confirmDel, setConfirmDel] = useState(null);
            const [sortCol, setSortCol] = useState("submitted_date");
            const [sortDir, setSortDir] = useState("desc");

            const filtered = useMemo(() => {
                let r = (applicants || []).filter(a =>
                    (filter === "all" || a.status === filter) &&
                    (a.name.toLowerCase().includes(search.toLowerCase()) || a.id.toLowerCase().includes(search.toLowerCase()) || a.course.toLowerCase().includes(search.toLowerCase()))
                );
                r = r.slice().sort((a, b) => {
                    let av = a[sortCol] ?? "", bv = b[sortCol] ?? "";
                    if (typeof av === "number") return sortDir === "asc" ? av - bv : bv - av;
                    return sortDir === "asc" ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
                });
                return r;
            }, [applicants, search, filter, sortCol, sortDir]);

            const sort = (col) => { if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc"); else { setSortCol(col); setSortDir("asc"); } };

            const setStatus = (id, status, remarks = "") => {
                updateApplicant(id, { status, remarks });
                const statusMessages = {
                    "approved": "Application approved! Applicant will receive scholarship benefits.",
                    "rejected": "Application rejected. Applicant may re-apply next semester.",
                    "pending": "Application pending review by scholarship committee.",
                    "under review": "Application under review. Evaluation in progress."
                };
                addNotif(`Application ${id} status updated to ${status.toUpperCase()}. ${statusMessages[status] || "Status changed."}`, "application", "applications");
                toast(`Status updated to "${status}"`);
                if (selected?.id === id) setSelected(p => ({ ...p, status, remarks }));
            };

            const promoteToGrantee = (app) => {
                if (grantees.find(g => g.name === app.name)) { toast("Already a grantee", "warn"); return; }
                addGrantee({ name: app.name, appId: app.id, course: app.course, year: app.year || 1, school: app.school, gwa: app.gwa, prevGwa: app.gwa, attendance: 100, grades: { midterm: 0, finals: 0 }, stipend: "Active", sem: "2nd Sem 2025-2026", stipendAmt: 7500, contact: app.contact, email: app.email, avatar: app.avatar });
                updateApplicant(app.id, { status: "approved" });
                addNotif(`${app.name} has been converted to a CHED Grantee! Scholarship benefits (₱7,500/month) will be disbursed starting this semester.`, "application", "grantees");
                toast(`${app.name} added as grantee`);
                setSelected(null);
            };

            const eligCheck = (a) => {
                const courseMatch = a.course && COURSES.some(c => c.toLowerCase() === a.course.toLowerCase());
                return [
                    ["GWA ≤ 2.0", a.gwa <= 2.0, `GWA: ${a.gwa}`],
                    ["Annual Income ≤ ₱400,000", (a.annual_income || 0) <= 400000, `₱${(a.annual_income || 0).toLocaleString()}`],
                    ["Required Documents (min 3)", (a.documents || []).length >= 3, `${(a.documents || []).length} uploaded`],
                    ["Valid Course", courseMatch, a.course],
                ];
            };

            const cols = [["id", "ID"], ["name", "Name"], ["course", "Course"], ["gwa", "GWA"], ["annual_income", "Income"], ["status", "Status"], ["submitted_date", "Submitted"]];
            const SH = ({ col, label }) => (
                <th onClick={() => sort(col)} style={{ padding: "11px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5, cursor: "pointer", whiteSpace: "nowrap", userSelect: "none" }}>
                    {label}{sortCol === col && (sortDir === "asc" ? " ↑" : " ↓")}
                </th>
            );

            return (
                <div className="fade-in">
                    {user && <div style={{ background: "#fff", borderRadius: 12, padding: "14px 18px", marginBottom: 18, display: "flex", alignItems: "center", gap: 10, boxShadow: "0 1px 8px rgba(15,40,80,0.05)" }}>
                        <div style={{ width: 36, height: 36, background: "#0f2d5c", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700 }}>{user.avatar || user.name?.charAt(0)}</div>
                        <div>
                            <div style={{ fontSize: 12, color: "#9ca3af" }}>Managing applications as {role ? role.charAt(0).toUpperCase() + role.slice(1) : ''}</div>
                            <div style={{ fontSize: 14, fontWeight: 700, color: "#0f1f3d" }}>{user.name}</div>
                        </div>
                    </div>}
                    {/* Toolbar */}
                    <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap", alignItems: "center" }}>
                        <div style={{ position: "relative", flex: 1, minWidth: 200 }}>
                            <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#9ca3af" }}><Ic n="search" s={15} /></span>
                            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name, ID, or course…" style={{ ...inp, paddingLeft: 36 }} />
                        </div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                            {["all", "pending", "under review", "approved", "rejected"].map(f => (
                                <button key={f} onClick={() => setFilter(f)} style={{ padding: "9px 13px", borderRadius: 9, border: `1.5px solid ${filter === f ? "#0f2d5c" : "#e2e8f0"}`, background: filter === f ? "#0f2d5c" : "#fff", color: filter === f ? "#fff" : "#64748b", fontSize: 11, fontWeight: 600, cursor: "pointer", textTransform: "capitalize", whiteSpace: "nowrap" }}>{f === "all" ? "All" : f}</button>
                            ))}
                        </div>
                        <button onClick={() => setAddModal(true)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "9px 16px", borderRadius: 10, border: "none", background: "#2563eb", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer", whiteSpace: "nowrap" }}>
                            <Ic n="plus" s={14} /> New Application
                        </button>
                    </div>

                    {/* Table */}
                    <div style={{ background: "#fff", borderRadius: 16, boxShadow: "0 1px 12px rgba(15,40,80,0.07)", overflowX: "auto" }}>
                        <table style={{ minWidth: 780 }}>
                            <thead>
                                <tr style={{ background: "#f8fafc" }}>
                                    {cols.map(([c, l]) => <SH key={c} col={c} label={l} />)}
                                    <th style={{ padding: "11px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5 }}>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.map((a, i) => (
                                    <tr key={a.id} style={{ borderTop: "1px solid #f1f5f9", background: i % 2 === 0 ? "#fff" : "#fafbfd" }}>
                                        <td data-label="ID" style={{ padding: "12px 14px", fontSize: 11, fontWeight: 700, color: "#2563eb" }}>{a.id}</td>
                                        <td data-label="Name" style={{ padding: "12px 14px" }}>
                                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                                <Avatar t={a.avatar} size={30} bg="#2563eb" />
                                                <div>
                                                    <div style={{ fontSize: 13, fontWeight: 600, color: "#0f1f3d" }}>{a.name}</div>
                                                    <div style={{ fontSize: 10, color: "#9ca3af" }}>{a.school}</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td data-label="Course" style={{ padding: "12px 14px", fontSize: 12, color: "#374151" }}>{a.course}</td>
                                        <td data-label="GWA" style={{ padding: "12px 14px", fontSize: 12, fontWeight: 700, color: a.gwa <= 1.75 ? "#16a34a" : a.gwa <= 2.0 ? "#d97706" : "#dc2626" }}>{parseFloat(a.gwa).toFixed(2)}</td>
                                        <td data-label="Income" style={{ padding: "12px 14px", fontSize: 12, color: "#374151" }}>\u20B1{(a.annual_income || 0).toLocaleString()}</td>
                                        <td data-label="Status" style={{ padding: "12px 14px" }}><Badge s={a.status} /></td>
                                        <td data-label="Submitted" style={{ padding: "12px 14px", fontSize: 11, color: "#9ca3af" }}>{fmt(a.submitted_date)}</td>
                                        <td data-label="Actions" style={{ padding: "12px 14px" }}>
                                            <div style={{ display: "flex", gap: 6 }}>
                                                <button onClick={() => setSelected(a)} style={{ background: "#eff6ff", color: "#2563eb", border: "none", borderRadius: 7, padding: "5px 9px", fontSize: 11, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}><Ic n="eye" s={12} />View</button>
                                                <button onClick={() => setEditModal(a)} style={{ background: "#f0fdf4", color: "#16a34a", border: "none", borderRadius: 7, padding: "5px 9px", fontSize: 11, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}><Ic n="edit" s={12} />Edit</button>
                                                <button onClick={() => setConfirmDel(a.id)} style={{ background: "#fef2f2", color: "#dc2626", border: "none", borderRadius: 7, padding: "5px 9px", fontSize: 11, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}><Ic n="trash" s={12} /></button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filtered.length === 0 && <div style={{ padding: 40, textAlign: "center", color: "#9ca3af", fontSize: 14 }}>No applications found.</div>}
                    </div>
                    <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 8 }}>Showing {filtered.length} of {(applicants || []).length} applications</div>

                    {/* Detail Modal */}
                    {selected && (
                        <Modal open title={`Application — ${selected.name}`} onClose={() => setSelected(null)} width={600}>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
                                {[["ID", selected.id], ["Course", selected.course], ["School", selected.school], ["Year", selected.year || "—"], ["GWA", selected.gwa], ["Family Income", `\u20B1${(selected.annual_income || 0).toLocaleString()}`], ["Date of Birth", fmt(selected.dob)], ["Gender", selected.gender], ["Contact", selected.contact], ["Email", selected.email], ["Submitted", fmt(selected.submitted_date)]].map(([l, v]) => (
                                    <div key={l} style={{ background: "#f8fafc", borderRadius: 10, padding: "11px 14px" }}>
                                        <div style={{ fontSize: 10, color: "#9ca3af", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>{l}</div>
                                        <div style={{ fontSize: 13, fontWeight: 700, color: "#0f1f3d", marginTop: 3 }}>{v || "—"}</div>
                                    </div>
                                ))}
                            </div>
                            <div style={{ marginBottom: 16 }}>
                                <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 10 }}>Address</div>
                                <div style={{ background: "#f8fafc", borderRadius: 10, padding: "11px 14px", fontSize: 13, color: "#374151" }}>{selected.address || "—"}</div>

                                <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 10 }}>Documents ({(selected.documents || []).length})</div>

                                    {(selected.documents || []).map(d => <span key={d} style={{ background: "#dcfce7", color: "#166534", borderRadius: 99, padding: "4px 11px", fontSize: 11, fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}><Ic n="ok" s={10} />  {d}</span>)}
                                </div>
                            </div>
                            <div style={{ background: "#f8fafc", borderRadius: 12, padding: 16, marginBottom: 20 }}>
                                <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 12 }}>Automated Eligibility Verification</div>
                                {eligCheck(selected).map(([label, pass, detail]) => (
                                    <div key={label} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 9 }}>
