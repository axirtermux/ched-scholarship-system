                                <button onClick={() => { setStatus(selected.id, "approved"); }} style={{ flex: 1, padding: "10px", borderRadius: 9, border: "none", background: "#16a34a", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", gap: 5 }}><Ic n="ok" s={13} />Approve</button>
                                <button onClick={() => { setStatus(selected.id, "under review"); }} style={{ flex: 1, padding: "10px", borderRadius: 9, border: "none", background: "#2563eb", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>Under Review</button>
                                <button onClick={() => { setStatus(selected.id, "rejected", "Does not meet all eligibility criteria."); }} style={{ flex: 1, padding: "10px", borderRadius: 9, border: "none", background: "#dc2626", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", gap: 5 }}><Ic n="x" s={13} />Reject</button>
                                <button onClick={() => promoteToGrantee(selected)} disabled={selected.status !== "approved"} style={{ flex: 1, padding: "10px", borderRadius: 9, border: "none", background: selected.status === "approved" ? "#7c3aed" : "#e2e8f0", color: selected.status === "approved" ? "#fff" : "#9ca3af", fontWeight: 700, cursor: selected.status === "approved" ? "pointer" : "default", fontSize: 12 }}>→ Make Grantee</button>
                            </div>
                        </Modal>
                    )}

                    {/* Add Modal */}
                    <AppForm open={addModal} onClose={() => setAddModal(false)} onSave={(d) => { addApplicant(d); setAddModal(false); toast("Application added"); }} title="New Application" />
                    {/* Edit Modal */}
                    {editModal && <AppForm open onClose={() => setEditModal(null)} onSave={(d) => { updateApplicant(editModal.id, d); setEditModal(null); toast("Application updated"); }} title="Edit Application" initial={editModal} />}
                    {/* Delete Confirm */}
                    <Confirm open={!!confirmDel} msg="Are you sure you want to delete this application? This cannot be undone." onYes={() => { deleteApplicant(confirmDel); setConfirmDel(null); toast("Application deleted", "warn"); }} onNo={() => setConfirmDel(null)} danger />
                </div>
            );
        }

        function AppForm({ open, onClose, onSave, title, initial }) {
            const empty = { name: "", dob: "", gender: "", contact: "", email: "", address: "", course: "", year: 1, school: "", gwa: "", annual_income: "", documents: [] };
            const [f, setF] = useState(initial || empty);
            useEffect(() => { if (open) setF(initial || empty); }, [open, initial]);
            const s = (k, v) => setF(p => ({ ...p, [k]: v }));
            const toggleDoc = (d) => setF(p => ({ ...p, documents: (p.documents || []).includes(d) ? (p.documents || []).filter(x => x !== d) : [...(p.documents || []), d] }));
            const submit = () => { if (!f.name || !f.course || !f.school || !f.gwa) { alert("Please fill required fields."); return; } onSave({ ...f, gwa: parseFloat(f.gwa), annual_income: parseInt(f.annual_income) || 0, year: parseInt(f.year) || 1 }); };
            return (
                <Modal open={open} onClose={onClose} title={title} width={620}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                        <div style={{ gridColumn: "1/-1" }}><Field label="Full Name" required><input value={f.name} onChange={e => s("name", e.target.value)} style={inp} /></Field></div>
                        <Field label="Date of Birth"><input type="date" value={f.dob} onChange={e => s("dob", e.target.value)} style={inp} /></Field>
                        <Field label="Gender"><select value={f.gender} onChange={e => s("gender", e.target.value)} style={sel}><option value="">Select…</option>{["Male", "Female", "Other"].map(g => <option key={g}>{g}</option>)}</select></Field>
                        <Field label="Contact Number"><input value={f.contact} onChange={e => s("contact", e.target.value)} style={inp} /></Field>
                        <Field label="Email"><input type="email" value={f.email} onChange={e => s("email", e.target.value)} style={inp} /></Field>
                        <div style={{ gridColumn: "1/-1" }}><Field label="Home Address"><input value={f.address} onChange={e => s("address", e.target.value)} style={inp} /></Field></div>
                        <Field label="Course" required><select value={f.course} onChange={e => s("course", e.target.value)} style={sel}><option value="">Select…</option>{COURSES.map(c => <option key={c}>{c}</option>)}</select></Field>
                        <Field label="Year Level"><input type="number" min="1" max="5" value={f.year} onChange={e => s("year", e.target.value)} style={inp} /></Field>
                        <Field label="School/Campus" required><select value={f.school} onChange={e => s("school", e.target.value)} style={sel}><option value="">Select…</option>{SCHOOLS.map(sc => <option key={sc}>{sc}</option>)}</select></Field>
                        <Field label="GWA" required><input type="number" step="0.01" min="1" max="5" value={f.gwa} onChange={e => s("gwa", e.target.value)} style={inp} placeholder="e.g. 1.75" /></Field>
                        <div style={{ gridColumn: "1/-1" }}><Field label="Annual Family Income (\u20B1)" required><input type="number" value={f.annual_income} onChange={e => s("annual_income", e.target.value)} style={inp} placeholder="e.g. 48000" /></Field></div>
                    </div>
                    <div style={{ marginTop: 4 }}>
                        <Field label="Documents Submitted">
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7 }}>
                                {DOC_LIST.map(d => (
                                    <label key={d} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 12px", borderRadius: 9, border: `1.5px solid ${(f.documents || []).includes(d) ? "#16a34a" : "#e2e8f0"}`, cursor: "pointer", background: (f.documents || []).includes(d) ? "#f0fdf4" : "#fff", fontSize: 12 }}>
                                        <input type="checkbox" checked={(f.documents || []).includes(d)} onChange={() => toggleDoc(d)} style={{ display: "none" }} />
                                        <div style={{ width: 16, height: 16, borderRadius: 4, border: `2px solid ${(f.documents || []).includes(d) ? "#16a34a" : "#d1d5db"}`, background: (f.documents || []).includes(d) ? "#16a34a" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{(f.documents || []).includes(d) && <Ic n="ok" s={10} c="#fff" />}</div>
                                        <span style={{ color: (f.documents || []).includes(d) ? "#166534" : "#374151" }}>{d}</span>
                                    </label>
                                ))}
                            </div>
                        </Field>
                    </div>
                    <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
                        <button onClick={onClose} style={{ flex: 1, padding: "11px", borderRadius: 10, border: "1.5px solid #e2e8f0", background: "#fff", cursor: "pointer", fontWeight: 600, fontSize: 13 }}>Cancel</button>
                        <button onClick={submit} style={{ flex: 2, padding: "11px", borderRadius: 10, border: "none", background: "#0f2d5c", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Save Application</button>
                    </div>
                </Modal>
            );
        }

        // ═══════════════════════════════════════════════════════════════
        // GRANTEES PAGE (ADMIN)
        // ═══════════════════════════════════════════════════════════════
        function GranteesPage({ grantees, updateGrantee, deleteGrantee, addGrantee, toast, addNotif, user, role }) {
            const [search, setSearch] = useState("");
            const [filter, setFilter] = useState("all");
            const [selected, setSelected] = useState(null);
            const [editModal, setEditModal] = useState(null);
            const [addModal, setAddModal] = useState(false);
            const [confirmDel, setConfirmDel] = useState(null);
            const [gradeModal, setGradeModal] = useState(null);

            const filtered = grantees.filter(g =>
                (filter === "all" || (filter === "atrisk" && g.alerts.length > 0) || (filter === "current" && g.stipend === "Active") || (filter === "suspended" && g.stipend === "Suspended")) &&
                (g && g.name && g.id && g.name.toLowerCase().includes(search.toLowerCase()) || g.id.toLowerCase().includes(search.toLowerCase()))
            );

            const recalcAlerts = (g) => {
                const alerts = [];
                if (g.gwa > 2.0) alerts.push(g.gwa > 2.5 ? "GWA Critical" : "GWA Warning");
                if (g.attendance < 85) alerts.push(g.attendance < 70 ? "Attendance Critical" : "Low attendance");
                const stipend = alerts.filter(a => a.includes("Critical")).length > 0 ? "Suspended" : alerts.length > 0 ? "At Risk" : "Active";
                const stipendAmt = stipend === "Suspended" ? 0 : 7500;
                return { alerts, stipend, stipendAmt };
            };

            const saveGrades = (id, grades) => {
                const g = grantees.find(x => x.id === id);
                if (!g) return;
                const avg = ((grades.midterm + grades.finals) / 2);
                const newGwa = parseFloat((Math.max(1.0, Math.min(5.0, 5 - (avg / 25)))).toFixed(2));
                const upd = { grades, gwa: newGwa, ...recalcAlerts({ ...g, gwa: newGwa }) };
                updateGrantee(id, upd);
                if (upd.alerts.length > 0) {
                    const alertText = upd.alerts.includes("Critical") 
                        ? `Performance Alert: ${g.name} has critical issues (${upd.alerts.join(", ")}). Stipend may be suspended. Immediate action required.`
                        : `Performance Warning: ${g.name} has ${upd.alerts.join(", ")}. Monitor closely to maintain scholarship eligibility.`;
                    addNotif(alertText, "alert", "grantees");
                }
                toast("Grades & performance updated");
                setGradeModal(null);
                if (selected?.id === id) setSelected(p => ({ ...p, ...upd, grades }));
            };

            return (
                <div className="fade-in">
                    {user && <div style={{ background: "#fff", borderRadius: 12, padding: "14px 18px", marginBottom: 18, display: "flex", alignItems: "center", gap: 10, boxShadow: "0 1px 8px rgba(15,40,80,0.05)" }}>
                        <div style={{ width: 36, height: 36, background: "#0f2d5c", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700 }}>{user.avatar || user.name?.charAt(0)}</div>
                        <div>
                            <div style={{ fontSize: 12, color: "#9ca3af" }}>Monitoring grantees as {role ? role.charAt(0).toUpperCase() + role.slice(1) : ''}</div>
                            <div style={{ fontSize: 14, fontWeight: 700, color: "#0f1f3d" }}>{user.name}</div>
                        </div>
                    </div>}
                    <div className="grid-4" style={{ marginBottom: 18 }}>
                        <StatCard label="Total Grantees" value={grantees.length} color="#2563eb" icon="users" sub="This semester" />
                        <StatCard label="Current" value={grantees.filter(g => g.stipend === "Active").length} color="#16a34a" icon="ok" sub="Compliant" />
                        <StatCard label="At Risk" value={grantees.filter(g => g.stipend === "At Risk").length} color="#d97706" icon="warn" sub="Needs monitoring" />
                        <StatCard label="Suspended" value={grantees.filter(g => g.stipend === "Suspended").length} color="#dc2626" icon="x" sub="Stipend withheld" />
                    </div>

                    <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
                        <div style={{ position: "relative", flex: 1, minWidth: 200 }}>
                            <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#9ca3af" }}><Ic n="search" s={15} /></span>
                            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search grantees…" style={{ ...inp, paddingLeft: 36 }} />
                        </div>
                        {[["all", "All"], ["current", "Current"], ["atrisk", "At Risk"], ["suspended", "Suspended"]].map(([f, l]) => (
                            <button key={f} onClick={() => setFilter(f)} style={{ padding: "9px 13px", borderRadius: 9, border: `1.5px solid ${filter === f ? "#0f2d5c" : "#e2e8f0"}`, background: filter === f ? "#0f2d5c" : "#fff", color: filter === f ? "#fff" : "#64748b", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{l}</button>
                        ))}
                        <button onClick={() => setAddModal(true)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "9px 16px", borderRadius: 10, border: "none", background: "#2563eb", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer", whiteSpace: "nowrap" }}>
                            <Ic n="plus" s={14} /> Add Grantee
                        </button>
                    </div>

                    <div style={{ background: "#fff", borderRadius: 16, boxShadow: "0 1px 12px rgba(15,40,80,0.07)", overflowX: "auto" }}>
                        <table style={{ minWidth: 900 }}>
                            <thead>
                                <tr style={{ background: "#f8fafc" }}>
                                    {["ID", "Grantee", "Course", "Yr", "GWA", "Attendance", "Grades", "Stipend", "Alerts", "Actions"].map(h => (
                                        <th key={h} style={{ padding: "11px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5, whiteSpace: "nowrap" }}>{h}</th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.map((g, i) => (
                                    <tr key={g.id} style={{ borderTop: "1px solid #f1f5f9", background: i % 2 === 0 ? "#fff" : "#fafbfd" }}>
                                        <td data-label="ID" style={{ padding: "12px 14px", fontSize: 11, fontWeight: 700, color: "#2563eb" }}>{g.id}</td>
                                        <td data-label="Grantee" style={{ padding: "12px 14px" }}>
                                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                                <Avatar t={g.avatar} size={30} bg="#7c3aed" />
                                                <div>
                                                    <div style={{ fontSize: 13, fontWeight: 600, color: "#0f1f3d" }}>{g.name}</div>
                                                    <div style={{ fontSize: 10, color: "#9ca3af" }}>{g.school}</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td data-label="Course" style={{ padding: "12px 14px", fontSize: 12, color: "#374151" }}>{g.course}</td>
                                        <td data-label="Year" style={{ padding: "12px 14px", fontSize: 12, color: "#374151" }}>{g.year}</td>
                                        <td data-label="GWA" style={{ padding: "12px 14px", fontSize: 12, fontWeight: 700, color: g.gwa <= 1.75 ? "#16a34a" : g.gwa <= 2.0 ? "#d97706" : "#dc2626" }}>{parseFloat(g.gwa).toFixed(2)}</td>
                                        <td data-label="Attendance" style={{ padding: "12px 14px" }}>
                                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                                <span style={{ fontSize: 12, fontWeight: 700, color: g.attendance >= 85 ? "#16a34a" : "#dc2626", minWidth: 36 }}>{g.attendance}%</span>
                                                <div style={{ width: 60 }}><Bar v={g.attendance} max={100} color={g.attendance >= 85 ? "#16a34a" : g.attendance >= 70 ? "#d97706" : "#dc2626"} h={6} /></div>
                                            </div>
                                        </td>
                                        <td data-label="Grades" style={{ padding: "12px 14px", fontSize: 12, color: "#374151" }}>{g.grades.midterm || 0} / {g.grades.finals || 0}</td>
                                        <td data-label="Stipend" style={{ padding: "12px 14px" }}><GBadge s={g.stipend} /></td>
                                        <td data-label="Alerts" style={{ padding: "12px 14px" }}>
                                            {g.alerts.length === 0 ? <span style={{ fontSize: 11, color: "#16a34a", fontWeight: 600 }}>None</span> :
                                                g.alerts.map(a => <div key={a} style={{ background: "#fee2e2", color: "#b91c1c", borderRadius: 6, padding: "2px 7px", fontSize: 10, fontWeight: 600, marginBottom: 2, display: "inline-block", marginRight: 3 }}>{a}</div>)}
                                        </td>
                                        <td data-label="Actions" style={{ padding: "12px 14px" }}>
                                            <div style={{ display: "flex", gap: 5 }}>
                                                <button onClick={() => setSelected(g)} style={{ background: "#eff6ff", color: "#2563eb", border: "none", borderRadius: 7, padding: "5px 9px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}><Ic n="eye" s={12} /></button>
                                                <button onClick={() => setGradeModal(g)} style={{ background: "#f0fdf4", color: "#16a34a", border: "none", borderRadius: 7, padding: "5px 9px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}><Ic n="edit" s={12} /></button>
                                                <button onClick={() => setEditModal(g)} style={{ background: "#faf5ff", color: "#7c3aed", border: "none", borderRadius: 7, padding: "5px 9px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}><Ic n="settings" s={12} /></button>
                                                <button onClick={() => setConfirmDel(g.id)} style={{ background: "#fef2f2", color: "#dc2626", border: "none", borderRadius: 7, padding: "5px 9px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}><Ic n="trash" s={12} /></button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filtered.length === 0 && <div style={{ padding: 40, textAlign: "center", color: "#9ca3af", fontSize: 14 }}>No grantees found.</div>}
                    </div>

                    {/* Detail Modal */}
                    {selected && <GranteeDetail g={selected} onClose={() => setSelected(null)} onEdit={() => { setEditModal(selected); setSelected(null); }} onGrade={() => { setGradeModal(selected); setSelected(null); }} />}

                    {/* Grade Modal */}
                    {gradeModal && <GradeForm g={gradeModal} onSave={saveGrades} onClose={() => setGradeModal(null)} />}

                    {/* Edit Modal */}
                    {editModal && <GranteeForm open title="Edit Grantee" initial={editModal} onClose={() => setEditModal(null)} onSave={(d) => { updateGrantee(editModal.id, d); setEditModal(null); toast("Grantee updated"); }} />}

                    {/* Add Modal */}
                    <GranteeForm open={addModal} title="Add Grantee" onClose={() => setAddModal(false)} onSave={(d) => { addGrantee(d); setAddModal(false); toast("Grantee added"); }} />

                    <Confirm open={!!confirmDel} msg="Delete this grantee record? This cannot be undone." onYes={() => { deleteGrantee(confirmDel); setConfirmDel(null); toast("Grantee removed", "warn"); }} onNo={() => setConfirmDel(null)} danger />
                </div>
            );
        }

        function GranteeDetail({ g, onClose, onEdit, onGrade }) {
            return (
                <Modal open title={`Grantee Profile — ${g.name}`} onClose={onClose} width={600}>
                    <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 22, padding: "16px 18px", background: "linear-gradient(135deg,#0f2d5c,#2563eb)", borderRadius: 14 }}>
                        <Avatar t={g.avatar} size={56} bg="rgba(255,255,255,0.2)" />
                        <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 18, fontWeight: 800, color: "#fff", fontFamily: "'Playfair Display',serif" }}>{g.name}</div>
                            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", marginTop: 3 }}>{g.course} · Year {g.year} · {g.school}</div>
                            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginTop: 2 }}>{g.sem}</div>
                        </div>
                        <GBadge s={g.stipend} />
                    </div>

                    <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 20 }}>
                        {[["GWA", parseFloat(g.gwa).toFixed(2), g.gwa <= 1.75 ? "#16a34a" : g.gwa <= 2.0 ? "#d97706" : "#dc2626"], ["Attendance", `${g.attendance}%`, g.attendance >= 85 ? "#16a34a" : g.attendance >= 70 ? "#d97706" : "#dc2626"], ["Stipend", `\u20B1${(g.stipendAmt || 0).toLocaleString()}`, (g.stipendAmt || 0) > 0 ? "#16a34a" : "#dc2626"]].map(([l, v, c]) => (
                            <div key={l} style={{ background: "#f8fafc", borderRadius: 12, padding: "16px", textAlign: "center" }}>
                                <div style={{ fontSize: 22, fontWeight: 800, color: c, fontFamily: "'Playfair Display',serif" }}>{v}</div>
                                <div style={{ fontSize: 11, color: "#6b7280", marginTop: 3, fontWeight: 600 }}>{l}</div>
                            </div>
                        ))}
                    </div>

                    <div style={{ background: "#f8fafc", borderRadius: 12, padding: 18, marginBottom: 16 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 14 }}>Academic Performance</div>
                        {[["Academic Standing", (g.gwa <= 1.75 ? 100 : g.gwa <= 2.0 ? 75 : g.gwa <= 2.5 ? 50 : 25), "#2563eb", `GWA: ${g.gwa}`],
                        ["Attendance Rate", g.attendance, "#16a34a", `${g.attendance}%`],
                        ["Midterm Grade", g.grades.midterm, "#7c3aed", `${g.grades.midterm}/100`],
                        ["Finals Grade", g.grades.finals, "#d97706", `${g.grades.finals}/100`]].map(([l, v, c, sub]) => (
                            <div key={l} style={{ marginBottom: 13 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 5 }}><span>{l}</span><span style={{ color: c }}>{sub}</span></div>
                                <Bar v={v} max={100} color={c} h={7} />
                            </div>
                        ))}
                    </div>

                    {g.alerts.length > 0 && (
                        <div style={{ background: "#fef2f2", borderRadius: 12, padding: 14, border: "1px solid #fecaca", marginBottom: 16 }}>
                            <div style={{ fontSize: 12, fontWeight: 700, color: "#b91c1c", marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}><Ic n="warn" s={14} />Active Alerts</div>
                            {g.alerts.map(a => <div key={a} style={{ fontSize: 12, color: "#7f1d1d", marginBottom: 4 }}>• {a}</div>)}
                        </div>
                    )}

                    {g.history && g.history.length > 0 && (
                        <div style={{ marginBottom: 16 }}>
                            <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 10 }}>Academic History</div>
                            {g.history.map((h, i) => (
                                <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: "#f8fafc", borderRadius: 9, marginBottom: 6 }}>
                                    <div>
                                        <div style={{ fontSize: 12, fontWeight: 600, color: "#0f1f3d" }}>{h.sem}</div>
                                        <div style={{ fontSize: 11, color: "#9ca3af" }}>GWA: {h.gwa} · Attendance: {h.attendance}%</div>
                                    </div>
                                    <span style={{ background: h.status === "Compliant" ? "#dcfce7" : h.status === "Warning" ? "#fef3c7" : "#fee2e2", color: h.status === "Compliant" ? "#166534" : h.status === "Warning" ? "#92400e" : "#b91c1c", borderRadius: 99, padding: "3px 10px", fontSize: 11, fontWeight: 700 }}>{h.status}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    <div style={{ display: "flex", gap: 10 }}>
                        <button onClick={onGrade} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: "#16a34a", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Update Grades</button>
                        <button onClick={onEdit} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: "#2563eb", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Edit Profile</button>
                    </div>
                </Modal>
            );
        }

        function GradeForm({ g, onSave, onClose }) {
            const [grades, setGrades] = useState({ midterm: g.grades.midterm || 0, finals: g.grades.finals || 0 });
            const [attendance, setAttendance] = useState(g.attendance);
            const preview = ((grades.midterm + grades.finals) / 2);
            return (
                <Modal open title={`Update Grades — ${g.name}`} onClose={onClose} width={440}>
                    <div style={{ background: "#f8fafc", borderRadius: 12, padding: 16, marginBottom: 20, display: "flex", gap: 12 }}>
                        <Avatar t={g.avatar} size={44} bg="#7c3aed" />
                        <div><div style={{ fontWeight: 700, color: "#0f1f3d" }}>{g.name}</div><div style={{ fontSize: 12, color: "#6b7280" }}>{g.course} · {g.sem}</div></div>
                    </div>
                    <Field label="Midterm Grade (0-100)">

        // NOTIFICATIONS PAGE (generic)
        // ═══════════════════════════════════════════════════════════════
        function NotificationsPage({ notifications, markRead, markAllRead, deleteNotif, setActive, role, user }) {
            const [filter, setFilter] = useState("all");
            const filtered = notifications.filter(n => filter === "all" || (filter === "unread" && !n.read) || (filter === n.type));
            const unread = notifications.filter(n => !n.read).length;
            const isAdmin = role === "admin";

            // Map notification links based on user role
            const getLinkForRole = (link) => {
                if (isAdmin) return link;
                if (role === "applicant") {
                    if (link === "applications") return "status";
                    return "notifications";
                }
                if (role === "grantee") {
                    if (link === "grantees") return "performance";
                    if (link === "applications") return "performance";
                    return "notifications";
                }
                return "notifications";
            };

            return (
                <div className="fade-in" style={{ maxWidth: 680 }}>
                    {user && <div style={{ background: "#fff", borderRadius: 12, padding: "14px 18px", marginBottom: 18, display: "flex", alignItems: "center", gap: 10, boxShadow: "0 1px 8px rgba(15,40,80,0.05)" }}>
                        <div style={{ width: 36, height: 36, background: "#0f2d5c", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700 }}>{user.avatar || user.name?.charAt(0)}</div>
                        <div>
                            <div style={{ fontSize: 12, color: "#9ca3af" }}>Viewing notifications as</div>
                            <div style={{ fontSize: 14, fontWeight: 700, color: "#0f1f3d" }}>{user.name}</div>
                        </div>
                    </div>}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
                        <div style={{ display: "flex", gap: 8 }}>
                            {[["all", "All"], ["unread", "Unread"], ["application", "Applications"], ["alert", "Alerts"], ["report", "Reports"]].map(([f, l]) => (
                                <button key={f} onClick={() => setFilter(f)} style={{ padding: "7px 12px", borderRadius: 8, border: `1.5px solid ${filter === f ? "#0f2d5c" : "#e2e8f0"}`, background: filter === f ? "#0f2d5c" : "#fff", color: filter === f ? "#fff" : "#64748b", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{l}{f === "unread" && unread > 0 ? ` (${unread})` : ""}</button>
                            ))}
                        </div>
                        {isAdmin && <button onClick={markAllRead} style={{ fontSize: 12, color: "#2563eb", background: "none", border: "none", cursor: "pointer", fontWeight: 600 }}>Mark all read</button>}
                    </div>

                    {filtered.length === 0 && <div style={{ background: "#fff", borderRadius: 16, padding: 40, textAlign: "center", color: "#9ca3af", fontSize: 14 }}>No notifications</div>}

                    {filtered.map(n => (
                        <div key={n.id} className="fade-in" style={{ background: n.read ? "#fff" : "#eff6ff", borderRadius: 14, padding: "16px 18px", marginBottom: 10, boxShadow: "0 1px 8px rgba(15,40,80,0.06)", display: "flex", gap: 14, alignItems: "flex-start", border: n.read ? "1px solid #f1f5f9" : "1px solid #bfdbfe", cursor: "pointer" }} onClick={() => { markRead(n.id); if (n.link) setActive(getLinkForRole(n.link)); }}>
                            <div style={{ width: 40, height: 40, borderRadius: 11, background: n.type === "alert" ? "#fee2e2" : n.type === "application" ? "#dcfce7" : "#dbeafe", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: n.type === "alert" ? "#ef4444" : n.type === "application" ? "#22c55e" : "#3b82f6" }}>
                                <Ic n={n.type === "alert" ? "warn" : n.type === "application" ? "file" : "rep"} s={18} />
                            </div>
                            <div style={{ flex: 1 }}>
                                <div style={{ fontSize: 13, color: "#0f1f3d", fontWeight: n.read ? 400 : 700, lineHeight: 1.5 }}>{n.msg}</div>
                                <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 4, display: "flex", alignItems: "center", gap: 6 }}><Ic n="cal" s={12} />{n.time}</div>
                            </div>
                            <div style={{ display: "flex", gap: 6, alignItems: "center", flexShrink: 0 }}>
                                {!n.read && <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#2563eb" }} />}
                                {isAdmin && <button onClick={e => { e.stopPropagation(); deleteNotif(n.id); }} style={{ background: "#fee2e2", border: "none", borderRadius: 7, padding: 5, cursor: "pointer", color: "#dc2626", display: "flex" }}><Ic n="x" s={12} /></button>}
                            </div>
                        </div>
                    ))}
                </div>
            );

                        console.error('Error parsing localStorage app data:', e);
                        return false;

                }

                return val;

                return val;

                        return null;

function DocumentsPage({ applicants, updateApplicant, toast, fetchDocumentsByApplicant, uploadDocument, deleteDocument, user }) {
            const myApp = applicants.find(a => a.email === user?.email);
            const [docs, setDocs] = useState(myApp?.docs || []);
            const [uploadedDocs, setUploadedDocs] = useState([]);
            const [uploading, setUploading] = useState(false);
            const [selectedDocType, setSelectedDocType] = useState(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (myApp?.id) {
                    fetchDocumentsByApplicant(myApp.id).then(setUploadedDocs);
                }
            }, [myApp?.id, fetchDocumentsByApplicant]);

            const save = () => {
                if (myApp) updateApplicant(myApp.id, { docs });
                toast("Documents updated");
            };

            const required = DOC_LIST.slice(0, 5);
            const optional = DOC_LIST.slice(5);

            const toggle = (d) => setDocs(prev => prev.includes(d) ? prev.filter(x => x !== d) : [...prev, d]);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || !selectedDocType || !myApp?.id) return;

                setUploading(true);
                const result = await uploadDocument(file, myApp.id, selectedDocType);
                if (result) {
                    await fetchDocumentsByApplicant(myApp.id).then(setUploadedDocs);
                    if (!docs.includes(selectedDocType)) {
                        setDocs(prev => [...prev, selectedDocType]);
                    }
                }
                setUploading(false);
                setSelectedDocType(null);
                if (fileInputRef.current) {
                    fileInputRef.current.value = '';
                }
            };

            const handleDeleteDoc = async (docId) => {
                if (confirm('Are you sure you want to delete this document?')) {
                    await deleteDocument(docId);
                    await fetchDocumentsByApplicant(myApp.id).then(setUploadedDocs);
                }
            };

            const getUploadedDocForType = (docType) => {
                return uploadedDocs.find(d => d.document_type === docType);
            };

            if (!myApp) {
                return (
                    <div style={{ maxWidth: 600, margin: "0 auto" }} className="fade-in">
                        <div style={{ background: "#fff", borderRadius: 18, padding: 28, boxShadow: "0 2px 16px rgba(15,40,80,0.08)", marginBottom: 16, textAlign: "center" }}>
                            <div style={{ fontWeight: 800, fontSize: 16, color: "#0f1f3d", marginBottom: 6, fontFamily: "'Playfair Display',serif" }}>No Application Found</div>
                            <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 20 }}>You haven't submitted a scholarship application yet.</div>
                            <button onClick={() => window.location.href = '#apply'} style={{ padding: "10px 20px", borderRadius: 10, border: "none", background: "#0f2d5c", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Apply Now</button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ maxWidth: 600, margin: "0 auto" }} className="fade-in">
                    <div style={{ background: "#fff", borderRadius: 18, padding: 28, boxShadow: "0 2px 16px rgba(15,40,80,0.08)", marginBottom: 16 }}>
                        <div style={{ fontWeight: 800, fontSize: 16, color: "#0f1f3d", marginBottom: 6, fontFamily: "'Playfair Display',serif" }}>My Documents</div>
                        <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 6 }}>Manage your submitted scholarship application documents.</div>
                        <div style={{ background: "#f0f7ff", borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#1d4ed8", marginBottom: 20, display: "flex", alignItems: "center", gap: 8 }}><Ic n="info" s={14} />At least 3 required documents must be submitted for eligibility.</div>

                        <div style={{ marginBottom: 20 }}>
                            <div style={{ fontWeight: 700, fontSize: 13, color: "#374151", marginBottom: 12 }}>Required Documents</div>
                            {required.map(d => {
                                const uploaded = getUploadedDocForType(d);
                                return (
                                    <div key={d} style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", borderRadius: 11, border: `1.5px solid ${uploaded ? "#16a34a" : docs.includes(d) ? "#16a34a" : "#e2e8f0"}`, marginBottom: 9, background: uploaded ? "#f0fdf4" : docs.includes(d) ? "#f0fdf4" : "#fff", transition: "all .15s" }}>
                                        <div style={{ width: 38, height: 38, background: uploaded ? "#dcfce7" : docs.includes(d) ? "#dcfce7" : "#f1f5f9", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", color: uploaded ? "#16a34a" : docs.includes(d) ? "#16a34a" : "#9ca3af", flexShrink: 0 }}><Ic n={uploaded || docs.includes(d) ? "ok" : "up"} s={18} /></div>
                                        <div style={{ flex: 1 }}>
                                            <div style={{ fontSize: 13, fontWeight: 600, color: "#0f1f3d" }}>{d}</div>

                                                <div style={{ fontSize: 11, color: "#16a34a", marginTop: 2 }}>✓ File uploaded: {uploaded.file_name}</div>
                                            ) : (
                                                <div style={{ fontSize: 11, color: docs.includes(d) ? "#22c55e" : "#9ca3af", marginTop: 2 }}>{docs.includes(d) ? "✓ Marked as submitted" : "Not yet submitted"}</div>
                                            )}
                                        </div>
                                        {uploaded ? (
                                            <button onClick={() => handleDeleteDoc(uploaded.id)} style={{ background: "#fee2e2", color: "#dc2626", border: "none", borderRadius: 9, padding: "7px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
                                                Delete
                                            </button>
                                        ) : (
                                            <div style={{ display: "flex", gap: 8 }}>
                                                <button onClick={() => { setSelectedDocType(d); if (fileInputRef.current) fileInputRef.current.click(); }} style={{ background: "#0f2d5c", color: "#fff", border: "none", borderRadius: 9, padding: "7px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
                                                    Upload File
                                                </button>
                                                <button onClick={() => toggle(d)} style={{ background: docs.includes(d) ? "#fee2e2" : "#f1f5f9", color: docs.includes(d) ? "#dc2626" : "#374151", border: "none", borderRadius: 9, padding: "7px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
                                                    {docs.includes(d) ? "Remove" : "Mark"}
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        <div style={{ marginBottom: 20 }}>
                            <div style={{ fontWeight: 700, fontSize: 13, color: "#374151", marginBottom: 12 }}>Supporting Documents <span style={{ fontWeight: 400, color: "#9ca3af", fontSize: 11 }}>(optional)</span></div>
                            {optional.map(d => {
                                const uploaded = getUploadedDocForType(d);
                                return (
                                    <div key={d} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 10, border: `1.5px solid ${uploaded ? "#2563eb" : docs.includes(d) ? "#2563eb" : "#e2e8f0"}`, marginBottom: 8, background: uploaded ? "#eff6ff" : docs.includes(d) ? "#eff6ff" : "#fff" }}>
                                        <div style={{ flex: 1 }}>
                                            <div style={{ fontSize: 12, fontWeight: 600, color: "#374151" }}>{d}</div>
                                            {uploaded ? (
                                                <div style={{ fontSize: 11, color: "#2563eb", marginTop: 2 }}>✓ File uploaded: {uploaded.file_name}</div>
                                            ) : (
                                                <div style={{ fontSize: 11, color: docs.includes(d) ? "#2563eb" : "#9ca3af", marginTop: 2 }}>{docs.includes(d) ? "✓ Marked as submitted" : "Not yet submitted"}</div>
                                            )}
                                        </div>
                                        {uploaded ? (
                                            <button onClick={() => handleDeleteDoc(uploaded.id)} style={{ background: "#fee2e2", color: "#dc2626", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                                                Delete
                                            </button>
                                        ) : (
                                            <div style={{ display: "flex", gap: 8 }}>
                                                <button onClick={() => { setSelectedDocType(d); if (fileInputRef.current) fileInputRef.current.click(); }} style={{ background: "#0f2d5c", color: "#fff", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                                                    Upload
                                                </button>
                                                <button onClick={() => toggle(d)} style={{ background: docs.includes(d) ? "#fee2e2" : "#f1f5f9", color: docs.includes(d) ? "#dc2626" : "#374151", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                                                    {docs.includes(d) ? "Remove" : "Add"}
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        <div style={{ background: "#f8fafc", borderRadius: 12, padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
                            <span style={{ fontSize: 13, color: "#374151" }}><b style={{ color: "#0f1f3d" }}>{docs.length}</b> of {DOC_LIST.length} documents marked</span>
                            <span style={{ fontWeight: 700, color: docs.length >= 3 ? "#16a34a" : "#dc2626", fontSize: 12 }}>{docs.length >= 3 ? "✓ Eligible" : "Need " + (3 - docs.length) + " more"}</span>
                        </div>

                        <button onClick={save} style={{ width: "100%", padding: "13px", borderRadius: 12, border: "none", background: "#0f2d5c", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                            <Ic n="ok" s={16} />Save Document Status
                        </button>

                        <input
                            ref={fileInputRef}
                            type="file"
                            style={{ display: "none" }}
                            accept="image/*,.pdf"
                            onChange={handleFileUpload}
                        />
                    </div>
                </div>
            );
        }

                    )}

                    {/* Academic history */}
                    <div style={{ background: "#fff", borderRadius: 18, padding: 24, boxShadow: "0 2px 16px rgba(15,40,80,0.08)" }}>
                        <div style={{ fontWeight: 700, color: "#0f1f3d", fontSize: 15, marginBottom: 14 }}>Academic History</div>
                        {me.history.map((h, i) => (
                            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 16px", background: "#f8fafc", borderRadius: 11, marginBottom: 8 }}>
                                <div>
                                    <div style={{ fontSize: 13, fontWeight: 700, color: "#0f1f3d" }}>{h.sem}</div>
                                    <div style={{ fontSize: 11, color: "#9ca3af" }}>GWA: {h.gwa} · Attendance: {h.attendance}%</div>
                                </div>
                                <span style={{ background: h.status === "Compliant" ? "#dcfce7" : h.status === "Warning" ? "#fef3c7" : "#fee2e2", color: h.status === "Compliant" ? "#166534" : h.status === "Warning" ? "#92400e" : "#b91c1c", borderRadius: 99, padding: "4px 12px", fontSize: 11, fontWeight: 700 }}>{h.status}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════
        // GRANTEE: COMPLIANCE PAGE
        // ═══════════════════════════════════════════════════════════════
        function CompliancePage({ grantees, updateGrantee, toast, user }) {
            const me = grantees.find(g => g.email === user?.email);
            const [items, setItems] = useState(me?.compliance_items || []);

            const toggle = (id) => {
                setItems(p => p.map(i => i.id === id ? { ...i, done: !i.done } : i));
                toast("Compliance item updated");
            };

            const required = items.filter(i => i.required);
            const optional = items.filter(i => !i.required);
            const reqDone = required.filter(i => i.done).length;
            const compPct = Math.round((items.filter(i => i.done).length / items.length) * 100);

            return (
                <div style={{ maxWidth: 580, margin: "0 auto" }} className="fade-in">
                    {user && <div style={{ background: "#fff", borderRadius: 12, padding: "14px 18px", marginBottom: 18, display: "flex", alignItems: "center", gap: 10, boxShadow: "0 1px 8px rgba(15,40,80,0.05)" }}>
                        <div style={{ width: 36, height: 36, background: "#0f2d5c", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700 }}>{user.avatar || user.name?.charAt(0)}</div>
                        <div>
                            <div style={{ fontSize: 12, color: "#9ca3af" }}>Tracking compliance as</div>
                            <div style={{ fontSize: 14, fontWeight: 700, color: "#0f1f3d" }}>{user.name}</div>
                        </div>
                    </div>}
                    {/* Summary */}
                    <div style={{ background: "linear-gradient(135deg,#0f2d5c,#2563eb)", borderRadius: 18, padding: 24, color: "#fff", marginBottom: 18 }}>
                        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>Overall Compliance</div>
                        <div style={{ fontSize: 36, fontWeight: 900, fontFamily: "'Playfair Display',serif" }}>{compPct}%</div>
                        <div style={{ marginTop: 12, background: "rgba(255,255,255,0.2)", borderRadius: 99, height: 8, overflow: "hidden" }}>
                            <div style={{ width: `${compPct}%`, background: "#fff", height: "100%", borderRadius: 99, transition: "width 1s ease" }} />
                        </div>
                        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10 }}>
                            <span style={{ fontSize: 12, opacity: 0.75 }}>{items.filter(i => i.done).length}/{items.length} requirements met</span>
                            <span style={{ fontSize: 12, opacity: 0.75 }}>{reqDone}/{required.length} required</span>
                        </div>
                    </div>

                    {/* Required */}
                    <div style={{ background: "#fff", borderRadius: 18, padding: 24, boxShadow: "0 2px 16px rgba(15,40,80,0.08)", marginBottom: 14 }}>
                        <div style={{ fontWeight: 700, color: "#0f1f3d", fontSize: 15, marginBottom: 16 }}>Required Submissions</div>
                        {required.map(item => (
                            <div key={item.id} onClick={() => toggle(item.id)} style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 16px", borderRadius: 12, border: `1.5px solid ${item.done ? "#86efac" : "#fde68a"}`, marginBottom: 10, cursor: "pointer", background: item.done ? "#f0fdf4" : "#fffbeb", transition: "all .15s" }}>
                                <div style={{ width: 32, height: 32, borderRadius: "50%", background: item.done ? "#16a34a" : "#d97706", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", flexShrink: 0 }}>
                                    <Ic n={item.done ? "ok" : "warn"} s={15} />
                                </div>
                                <div style={{ flex: 1 }}>
                                    <div style={{ fontSize: 13, fontWeight: 700, color: "#0f1f3d" }}>{item.label}</div>
                                    <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 2, display: "flex", alignItems: "center", gap: 4 }}><Ic n="cal" s={11} />Due: {item.due}</div>
                                </div>
                                <span style={{ fontSize: 11, fontWeight: 700, color: item.done ? "#16a34a" : "#d97706", whiteSpace: "nowrap" }}>{item.done ? "Completed" : "Pending"}</span>
                            </div>
                        ))}
                    </div>

                    {/* Optional */}
                    <div style={{ background: "#fff", borderRadius: 18, padding: 24, boxShadow: "0 2px 16px rgba(15,40,80,0.08)" }}>
                        <div style={{ fontWeight: 700, color: "#0f1f3d", fontSize: 15, marginBottom: 16 }}>Supporting Documents <span style={{ fontWeight: 400, fontSize: 12, color: "#9ca3af" }}>(optional)</span></div>
                        {optional.map(item => (
                            <div key={item.id} onClick={() => toggle(item.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 10, border: `1.5px solid ${item.done ? "#bfdbfe" : "#e2e8f0"}`, marginBottom: 8, cursor: "pointer", background: item.done ? "#eff6ff" : "#fff" }}>
                                <div style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${item.done ? "#2563eb" : "#d1d5db"}`, background: item.done ? "#2563eb" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{item.done && <Ic n="ok" s={12} c="#fff" />}</div>
                                <div style={{ flex: 1, fontSize: 13, fontWeight: 600, color: "#374151" }}>{item.label}</div>
                                <span style={{ fontSize: 11, color: "#9ca3af" }}>{item.due}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════
        // PAGE TITLES
        // ═══════════════════════════════════════════════════════════════
        const PAGE_TITLES = {
            dashboard: "Dashboard Overview", applications: "Scholarship Applications", grantees: "Grantee Performance Monitoring",
            users: "User Management", reports: "Reports & Analytics", settings: "System Settings",
            apply: "Apply for Scholarship", status: "Track Application Status", documents: "My Documents", notifications: "Notifications", mynotif: "Notifications",
            performance: "My Performance", compliance: "Compliance Tracker",
        };

        // ═══════════════════════════════════════════════════════════════
        // ROOT APP
        // ═══════════════════════════════════════════════════════════════
        function App() {
            const state = useAppState();
            const [role, setRole] = useState(null);
            const [active, setActive] = useState(null);
            const [showNotifs, setShowNotifs] = useState(false);
            const [user, setUser] = useState(null);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            const defaultPages = { admin: "dashboard", applicant: "apply", grantee: "performance" };
            const login = (r, userData) => {
                setRole(r);
                setUser(userData);
                setActive(defaultPages[r]);
                localStorage.setItem('ched_role', r);
                localStorage.setItem('ched_user', JSON.stringify(userData));
                localStorage.setItem('ched_active', defaultPages[r]);
            };
            const logout = () => {
                setRole(null);
                setUser(null);
                setActive(null);
                localStorage.removeItem('ched_role');
                localStorage.removeItem('ched_user');
                localStorage.removeItem('ched_active');
            };

            // Restore login state from localStorage on mount
            useEffect(() => {
                const savedRole = localStorage.getItem('ched_role');
                const savedUser = localStorage.getItem('ched_user');
                const savedActive = localStorage.getItem('ched_active');
                if (savedRole) {
                    setRole(savedRole);
                    setActive(savedActive || defaultPages[savedRole]);
                    if (savedUser) {
                        try {
                            setUser(JSON.parse(savedUser));
                        } catch (e) {
                            console.error('Failed to parse saved user data', e);
                        }
                    }
                }
            }, []);

            const unread = state.notifications.filter(n => !n.read).length;

            if (!role) return <><LoginPage onLogin={login} users={state.users} /><Toast toasts={state.toasts} /></>;

            const renderPage = () => {
                switch (active) {
                    case "dashboard": return <AdminDashboard applicants={state.applicants} grantees={state.grantees} notifications={state.notifications} setActive={setActive} user={user} role={role} />;
                    case "applications": return <ApplicationsPage applicants={state.applicants} updateApplicant={state.updateApplicant} deleteApplicant={state.deleteApplicant} addApplicant={state.addApplicant} addGrantee={state.addGrantee} grantees={state.grantees} toast={state.toast} addNotif={state.addNotif} user={user} role={role} />;
                    case "grantees": return <GranteesPage grantees={state.grantees} updateGrantee={state.updateGrantee} deleteGrantee={state.deleteGrantee} addGrantee={state.addGrantee} toast={state.toast} addNotif={state.addNotif} user={user} role={role} />;
                    case "users": return <UsersPage users={state.users} updateUser={state.updateUser} deleteUser={state.deleteUser} addUser={state.addUser} toast={state.toast} user={user} />;
                    case "reports": return <ReportsPage applicants={state.applicants} grantees={state.grantees} user={user} />;
                    case "settings": return <SettingsPage toast={state.toast} user={user} />;
                    case "apply": return <ApplyPage addApplicant={state.addApplicant} toast={state.toast} applicants={state.applicants} user={user} />;
                    case "status": return <StatusPage applicants={state.applicants} user={user} />;
                    case "documents": return <DocumentsPage applicants={state.applicants} updateApplicant={state.updateApplicant} toast={state.toast} fetchDocumentsByApplicant={state.fetchDocumentsByApplicant} uploadDocument={state.uploadDocument} deleteDocument={state.deleteDocument} user={user} />;
                    case "notifications": return <NotificationsPage notifications={state.notifications} markRead={state.markRead} markAllRead={state.markAllRead} deleteNotif={state.deleteNotif} setActive={setActive} role={role} user={user} />;
                    case "mynotif": return <NotificationsPage notifications={state.notifications} markRead={state.markRead} markAllRead={state.markAllRead} deleteNotif={state.deleteNotif} setActive={setActive} role={role} user={user} />;
                    case "performance": return <MyPerformancePage grantees={state.grantees} user={user} />;
                    case "compliance": return <CompliancePage grantees={state.grantees} updateGrantee={state.updateGrantee} toast={state.toast} user={user} />;
                    default: return null;
                }
            };

            return (
                <div style={{ display: "flex", minHeight: "100vh", background: "#f0f4f8" }}>
                    <Sidebar role={role} active={active} setActive={(p) => { setActive(p); setShowNotifs(false); }} unreadCount={unread} onLogout={logout} applicants={state.applicants} user={user} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenuOpen} />
                    <div className="main-content" style={{ marginLeft: 220, flex: 1, display: "flex", flexDirection: "column", minHeight: "100vh", overflow: "hidden" }}>
                        <Topbar title={PAGE_TITLES[active] || ""} notifs={state.notifications} showNotifs={showNotifs} setShowNotifs={setShowNotifs} markRead={state.markRead} markAllRead={state.markAllRead} setActive={setActive} role={role} user={user} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenuOpen} />
                        <div style={{ padding: 26, flex: 1, overflowY: "auto" }}>
                            {renderPage()}
                        </div>
                    </div>
                    {mobileMenuOpen && (
                        <div onClick={() => setMobileMenuOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 150 }} />
                    )}
                    <Toast toasts={state.toasts} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
